# A string used to distinguish different Supabase projects on the same host.
project_id = "fits-meettrack-ai"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
enabled = true

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "fits-meettrack://"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.process-meeting]
verify_jwt = true
